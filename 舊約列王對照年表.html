<script type="text/babel">
    const { useState, useRef, Fragment } = React;

    const App = () => {
        const [isExporting, setIsExporting] = useState(false);
        const timelineRef = useRef(null);

        const START_YEAR = 931;
        const END_YEAR   = 586;
        const YEAR_PX    = 15;

        const downloadImage = async () => {
            setIsExporting(true);
            try {
                if (typeof window.html2canvas === 'undefined') {
                    await new Promise((resolve, reject) => {
                        const script = document.createElement('script');
                        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                        script.onload = resolve; script.onerror = reject;
                        document.head.appendChild(script);
                    });
                }
                const canvas = await window.html2canvas(timelineRef.current, {
                    scale: 2, useCORS: true, backgroundColor: '#e7e5e4',
                });
                const link = document.createElement('a');
                link.download = '舊約列王暨先知對照年表.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) { console.error('下載失敗:', err); }
            finally { setIsExporting(false); }
        };

        // ─────────────────────────────────────────────
        //  DATA
        // ─────────────────────────────────────────────
        const data = {
            patriarchs: [
                { name: '亞當', period: '壽 930 歲', eval: 'mixed', label: '始', note: '人類始祖；因犯罪失落伊甸園，死亡從此進入世界。（創2–3）' },

            ],
            founders: [
                { name: '亞伯拉罕', period: '壽 175 歲', eval: 'good', label: '信', note: '信心之父；蒙召離開吾珥；領受割禮之約；以撒為應許之子。（創12–25）' },

                { name: '撒母耳', period: '約 1060–1010 BC', eval: 'good', label: '聖', note: '最後一位士師兼先知；膏立掃羅為王後又膏立大衛；守護王朝交替。（撒上1–16）' },
            ],
            united: [
                { name: '掃羅',   period: '1050–1010 BC', eval: 'bad',   label: '惡', note: '以色列首位君王；因悖逆神擅自獻祭、留下亞瑪力戰利品而被廢黜；戰死基利波山。（撒上9–31）' },

            ],

            // ── South Kingdom (Judah) – 20 kings ──

                { name: '羅波安',   start: 931, end: 913, eval: 'bad',   label: '惡', note: '不聽老臣之言加重賦稅，致王國分裂為南北。（王上12）' },

                  note: '亞述帝國全盛；那鴻預言其首都尼尼微必傾覆（663–612 BC）。' },
                { name: '拿波帕拉薩', empire: '巴比倫', empireTag: 'bg-red-700', start: 626, end: 605, bg: 'bg-red-50', border: 'border-red-500',
                  note: '新巴比倫帝國奠基者；612 BC 攻滅尼尼微，亞述帝國覆滅。' },
                { name: '尼布甲尼撒二世', empire: '巴比倫', empireTag: 'bg-red-700', start: 605, end: 562, bg: 'bg-red-50', border: 'border-red-500',
                  note: '605 BC 卡基米施大捷；三次入侵猶大（605、597、586 BC）；耶路撒冷陷落。' },
            ],
        };

        // ─────────────────────────────────────────────
        //  COMPONENTS
        // ─────────────────────────────────────────────

        const KingCard = ({ item }) => {
            const duration = Math.max(Math.abs(item.start - item.end), 0);
            const top    = (START_YEAR - item.start) * YEAR_PX;
            const height = Math.max(duration * YEAR_PX, 52);
            const evalColors = item.eval === 'good'  ? 'good-bg border-teal-600'  :
                               item.eval === 'bad'   ? 'bad-bg border-rose-600'   :
                               'mixed-bg border-amber-600';
            const badgeColor = item.eval === 'good'  ? 'bg-teal-600'  :
                               item.eval === 'bad'   ? 'bg-rose-600'  :
                               'bg-amber-600';
            return (
                <div style={{ position:'absolute', top:`${top}px`, height:`${height}px`, width:'100%' }}
                     className={`king-card p-1.5 border-l-4 rounded-r-lg shadow-sm border ${evalColors}`}>
                    <div className="flex justify-between items-start gap-1">
                        <span className="font-black text-stone-800 text-[9px] md:text-[11px] flex items-center gap-0.5 flex-wrap leading-tight">
                            {item.name}
                            <span className={`text-[7px] text-white px-1 py-0.5 rounded-sm ${badgeColor} whitespace-nowrap`}>{item.label}</span>
                        </span>
                        <span className="text-[8px] font-mono text-stone-500 whitespace-nowrap shrink-0">
                            {duration <= 1 ? `${item.start}` : `${item.start}–${item.end}`}
                        </span>
                    </div>
                    {height >= 68 && (
                        <p className="text-[8px] text-stone-600 leading-tight mt-0.5 italic line-clamp-2">{item.note}</p>
                    )}
                </div>
            );
        };

        const ProphetCard = ({ item, colorClass, borderClass }) => {
            const clampedStart = Math.min(item.start, START_YEAR);
            const clampedEnd   = Math.max(item.end,   END_YEAR);
            const top    = (START_YEAR - clampedStart) * YEAR_PX;
            const height = Math.max((clampedStart - clampedEnd) * YEAR_PX, 52);
            return (
                <div style={{ position:'absolute', top:`${top}px`, height:`${height}px`, width:'100%' }}
                     className={`king-card p-1.5 border-l-4 rounded-r-lg shadow-sm border ${colorClass} ${borderClass}`}>
                    <span className="font-black text-[9px] md:text-[11px] text-stone-800 leading-tight block">{item.name}</span>
                    <span className="text-[8px] font-mono text-stone-500">{item.start}–{item.end}</span>
                    {height >= 68 && (
                        <p className="text-[8px] text-stone-600 leading-tight mt-0.5 italic line-clamp-3">{item.note}</p>
                    )}
                </div>
            );
        };

        /** Empire / foreign-power card */
        const EmpireCard = ({ item }) => {
            const clampedStart = Math.min(item.start, START_YEAR);
            const clampedEnd   = Math.max(item.end,   END_YEAR);
            const top    = (START_YEAR - clampedStart) * YEAR_PX;
            const height = Math.max((clampedStart - clampedEnd) * YEAR_PX, 44);
            return (
                <div style={{ position:'absolute', top:`${top}px`, height:`${height}px`, width:'100%' }}
                     className={`king-card p-1 border-l-[3px] rounded-r-md shadow-sm border ${item.bg} ${item.border}`}>
                    <div className="flex items-start gap-1 flex-wrap">
                        <span className={`text-[7px] text-white px-1 py-0.5 rounded-sm ${item.empireTag} whitespace-nowrap shrink-0`}>{item.empire}</span>
                        <span className="font-black text-[8px] md:text-[9px] text-stone-800 leading-tight">{item.name}</span>
                    </div>
                    <span className="text-[7px] font-mono text-stone-400">{item.start}–{item.end}</span>
                    {height >= 62 && (
                        <p className="text-[7px] text-stone-600 leading-tight mt-0.5 italic line-clamp-2">{item.note}</p>
                    )}
                </div>
            );
        };

        const HistoryCard = ({ item }) => {
            const evalColors = item.eval === 'good'  ? 'good-bg border-teal-600'  :
                               item.eval === 'bad'   ? 'bad-bg border-rose-600'   :
                               'mixed-bg border-amber-600';
            const badgeColor = item.eval === 'good'  ? 'bg-teal-600'  :
                               item.eval === 'bad'   ? 'bg-rose-600'  :
                               'bg-amber-600';
            return (
                <div className={`king-card p-3 border-l-4 rounded-r-lg shadow-sm border ${evalColors}`} style={{ minHeight:'72px' }}>
                    <div className="flex justify-between items-start mb-0.5">
                        <span className="font-black text-stone-800 text-xs md:text-sm flex items-center gap-1">
                            {item.name}
                            <span className={`text-[8px] text-white px-1 py-0.5 rounded-sm ${badgeColor}`}>{item.label}</span>
                        </span>
                        <span className="text-[9px] font-mono text-stone-500 font-bold">{item.period}</span>
                    </div>
                    <p className="text-[9px] md:text-[10px] text-stone-600 leading-tight mt-1 italic">{item.note}</p>
                </div>
            );
        };

        const Ruler = () => {
            const marks = [];
            for (let y = START_YEAR; y >= END_YEAR; y -= 10) {
                marks.push(
                    <div key={y} className="relative h-0" style={{ top:`${(START_YEAR - y) * YEAR_PX}px` }}>
                        <span className="absolute right-2 -translate-y-1/2 text-[9px] text-stone-400 font-bold whitespace-nowrap">— {y}</span>
                    </div>
                );
            }
            return (
                <div className="border-r border-dashed border-stone-300 hidden md:block w-12 shrink-0 relative">{marks}</div>
            );
        };

        // ─────────────────────────────────────────────
        //  RENDER
        // ─────────────────────────────────────────────
        const totalHeight = (START_YEAR - END_YEAR) * YEAR_PX + 280;
        // Grid: South(2fr) | S.Prophets(1fr) | Regional(0.9fr) | Super(0.9fr) | N.Prophets(1fr) | North(2fr)
        const gridCols = '2fr 1fr 0.9fr 0.9fr 1fr 2fr';

        return (
            <div className="bg-stone-200 min-h-screen p-4 md:p-8 flex flex-col items-center">

                {/* ── Title Bar ── */}
                <div className="max-w-7xl w-full bg-white/95 backdrop-blur rounded-3xl p-8 mb-8 shadow-2xl border border-white flex flex-col md:flex-row justify-between items-center gap-6">
                    <div className="text-center md:text-left">
                        <h1 className="text-2xl md:text-4xl font-black text-stone-800 tracking-tighter">
                            舊約列王暨先知對照年表
                        </h1>
                        <p className="text-stone-500 text-sm mt-2 leading-relaxed">
                            依據列王記上下、歷代志上下及各先知書 · 年代採 Thiele 福音派年表<br/>
                            南國猶大全部20王 · 北國以色列全部19王 · 書寫先知13位 · 外邦強國歷代君王
                        </p>
                    </div>
                    <button onClick={downloadImage} disabled={isExporting}
                            className="bg-stone-900 text-white px-8 py-3 rounded-2xl font-black shadow-xl hover:bg-black transition-all active:scale-95 whitespace-nowrap">
                        {isExporting ? '生成中…' : '下載 PNG'}
                    </button>
                </div>

                <div ref={timelineRef} className="bg-stone-50 w-full max-w-7xl shadow-2xl rounded-[3rem] p-6 md:p-12 border border-stone-300">

                    {/* ── Section 1: Pre-Kingdom Lineage ── */}
                    <div className="flex flex-col items-center mb-16">
                        <h2 className="text-lg font-black mb-8 text-stone-400 uppercase tracking-widest border-b-2 border-stone-300 pb-2 w-full max-w-2xl text-center">
                            創世至統一王國（垂直傳承）
                        </h2>
                        {[...data.patriarchs, ...data.founders, ...data.exodus, ...data.united].map((item, i, arr) => (
                            <Fragment key={i}>
                                <div className="w-full max-w-2xl"><HistoryCard item={item} /></div>
                                {i < arr.length - 1 && <div className="w-0.5 bg-stone-300 h-4 mx-auto opacity-60"></div>}
                            </Fragment>
                        ))}
                    </div>

                    {/* ── Section 2: Proportional Split-Kingdom Timeline ── */}
                    <div className="border-t-4 border-double border-stone-200 pt-12">
                        <h2 className="text-center text-2xl md:text-3xl font-black mb-2 text-blue-900 tracking-tighter">
                            分裂王國、先知與外邦強國對照（比例時間軸）
                        </h2>
                        <p className="text-center text-stone-500 text-sm mb-8">
                            931 BC（王國分裂）→ 722 BC（北國亞述滅）→ 586 BC（南國巴比倫滅）
                        </p>

                        {/* Column header labels */}
                        <div className="grid gap-1 md:gap-2 mb-3 ml-14" style={{ gridTemplateColumns: gridCols }}>
                            <div className="py-2 px-2 bg-sky-950 text-white text-center font-black rounded-xl shadow text-[11px] md:text-xs">
                                南國 猶大<br/><span className="text-[9px] opacity-60 font-normal">Judah · 20王</span>
                            </div>
                            <div className="py-2 px-1 bg-violet-800 text-white text-center font-black rounded-xl shadow text-[10px]">
                                先知（南）<br/><span className="text-[8px] opacity-60 font-normal">S. Prophets</span>
                            </div>
                            <div className="py-2 px-1 bg-yellow-700 text-white text-center font-black rounded-xl shadow text-[10px]">
                                亞蘭・埃及<br/><span className="text-[8px] opacity-60 font-normal">Regional</span>
                            </div>
                            <div className="py-2 px-1 bg-orange-800 text-white text-center font-black rounded-xl shadow text-[10px]">
                                亞述・巴比倫<br/><span className="text-[8px] opacity-60 font-normal">Superpower</span>
                            </div>
                            <div className="py-2 px-1 bg-emerald-800 text-white text-center font-black rounded-xl shadow text-[10px]">
                                先知（北）<br/><span className="text-[8px] opacity-60 font-normal">N. Prophets</span>
                            </div>
                            <div className="py-2 px-2 bg-emerald-950 text-white text-center font-black rounded-xl shadow text-[11px] md:text-xs">
                                北國 以色列<br/><span className="text-[9px] opacity-60 font-normal">Israel · 19王</span>
                            </div>
                        </div>

                        <div className="flex gap-1 md:gap-2">
                            <Ruler />
                            <div className="grid gap-1 md:gap-2 flex-grow relative"
                                 style={{ gridTemplateColumns: gridCols, height:`${totalHeight}px` }}>

                                {/* Col 1 – South (Judah) */}
                                <div className="relative">
                                    <div className="relative h-full">
                                        {data.south.map((k, i) => <KingCard key={i} item={k} />)}
                                    </div>
                                </div>

                                {/* Col 2 – South Prophets */}
                                <div className="relative">
                                    <div className="relative h-full">
                                        {data.prophets_south.map((p, i) => (
                                            <ProphetCard key={i} item={p} colorClass="bg-violet-50" borderClass="border-violet-600" />
                                        ))}
                                    </div>
                                </div>

                                {/* Col 3 – Regional powers (Aram + Egypt) */}
                                <div className="relative">
                                    <div className="relative h-full">
                                        {data.empire_regional.map((e, i) => <EmpireCard key={i} item={e} />)}
                                    </div>
                                </div>

                                {/* Col 4 – Superpowers (Assyria → Babylon) */}
                                <div className="relative">
                                    <div className="relative h-full">
                                        {data.empire_super.map((e, i) => <EmpireCard key={i} item={e} />)}
                                    </div>
                                </div>

                                {/* Col 5 – North Prophets */}
                                <div className="relative">
                                    <div className="relative h-full">
                                        {data.prophets_north.map((p, i) => (
                                            <ProphetCard key={i} item={p} colorClass="bg-emerald-50" borderClass="border-emerald-600" />
                                        ))}
                                    </div>
                                </div>

                                {/* Col 6 – North (Israel) */}
                                <div className="relative">
                                    <div className="relative h-full">
                                        {data.north.map((k, i) => <KingCard key={i} item={k} />)}
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>

                    {/* ── Legend ── */}
                    <div className="mt-16 pt-8 border-t border-stone-200">
                        <h3 className="text-center font-black text-stone-400 mb-5 text-xs uppercase tracking-widest">圖例</h3>
                        <div className="flex flex-wrap justify-center gap-4 text-[11px] font-bold text-stone-600 mb-6">
                            <span className="flex items-center gap-1.5"><div className="w-3 h-3 bg-teal-600 rounded-sm"></div>行耶和華眼中正事</span>
                            <span className="flex items-center gap-1.5"><div className="w-3 h-3 bg-rose-600 rounded-sm"></div>行耶和華眼中惡事</span>
                            <span className="flex items-center gap-1.5"><div className="w-3 h-3 bg-amber-600 rounded-sm"></div>評價分歧 / 篡位</span>
                            <span className="flex items-center gap-1.5"><div className="w-3 h-3 bg-violet-600 rounded-sm"></div>先知（南國事奉）</span>
                            <span className="flex items-center gap-1.5"><div className="w-3 h-3 bg-emerald-600 rounded-sm"></div>先知（北國事奉）</span>
                            <span className="flex items-center gap-1.5"><div className="w-3 h-3 bg-yellow-600 rounded-sm"></div>亞蘭（大馬士革）</span>
                            <span className="flex items-center gap-1.5"><div className="w-3 h-3 bg-lime-600 rounded-sm"></div>埃及</span>
                            <span className="flex items-center gap-1.5"><div className="w-3 h-3 bg-orange-600 rounded-sm"></div>亞述帝國</span>
                            <span className="flex items-center gap-1.5"><div className="w-3 h-3 bg-red-700 rounded-sm"></div>新巴比倫帝國</span>
                        </div>
                        <div className="bg-stone-100 rounded-2xl p-5 max-w-4xl mx-auto">
                            <p className="text-[10px] text-stone-500 leading-relaxed">
                                <strong>年代說明：</strong>採 Edwin Thiele《希伯來君王的謎》年表（福音派神學院通用）。部分君王有<strong>共治期</strong>，故起訖年可能重疊（如烏西雅 792–740 與約坦 750–735；約沙法與亞撒尾端）。
                                比加（752–740 為吉列地區競爭王，740 BC 弒比加轄後為全國之王，本表採 740–732 以避免視覺重疊）。<br/>
                                <strong>外邦強國：</strong>亞述「阿達德尼拉里三世」攻打大馬士革一事，被多數學者認為是王下13:5「拯救者」的歷史背景。
                                「西拿基立圍攻耶路撒冷（701 BC）」是以賽亞書36–37章的直接歷史背景。
                                亞述「撒珥根二世」在位時北國正式滅亡（722 BC）。
                                <strong>先知年代為估算值</strong>，各導論略有出入；俄巴底亞、約珥年代尤有爭議。
                            </p>
                        </div>
                    </div>

                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
