name: Generate Sitemap

on:
  push:
    branches:
      - main
      - dev
    paths:
      - '**.html'
      - 'generate_sitemap.py'

jobs:
  sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate Sitemap
        run: python generate_sitemap.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: 自動更新 sitemap.xml [skip ci]"
          file_pattern: 'sitemap.xml'
